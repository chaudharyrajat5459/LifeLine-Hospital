<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityCare Hospital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            🏥 LifeLine Hospital
        </div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="#form">Admission</a></li>
            <li><a href="/patients">Patients</a></li>
        </ul>
    </nav>
    <header class="hero">
        <h1>Patient Admission Portal</h1>
        <p>
            Securely register patient information and
            manage hospital admissions.
        </p>
    </header>
    <section class="container">
        <div class="form-card" id="form">
            <h2>Hospital Admission Form</h2>
            <form action="/add-patient" method="POST">
                <label>Patient Name</label>
                <input type="text" name="name" required>
                <label>Age</label>
                <input type="number" name="age" required>
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
                <label>Phone Number</label>
                <input type="tel" name="phone" required>
                <label>Address</label>
                <textarea name="address" rows="3" required></textarea>
                <label>Disease / Illness</label>
                <input type="text" name="disease" required>
                <button type="submit">
                    Admit Patient
                </button>
            </form>
            <a class="view-btn" href="/patients">
                View Patient Records
            </a>
        </div>
    </section>
    <footer>
        <p>
            © 2026 CityCare Hospital Management System
        </p>
    </footer>
</body>
</html>
